name: Deploy Redirect to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-redirect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate Redirect Files
        run: |
          mkdir build
          cat << 'EOF' > build/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script>
                var newHost = "https://shubham-portfolio-seven-theta.vercel.app";
                var path = window.location.pathname;
                if (path.startsWith("/writeup")) {
                  path = path.substring(8);
                }
                var newUrl = newHost + path + window.location.search + window.location.hash;
                window.location.replace(newUrl);
              </script>
              <meta http-equiv="refresh" content="2; url=https://shubham-portfolio-seven-theta.vercel.app/" />
              <style>
                body { background-color: #000; color: #fff; font-family: monospace; text-align: center; padding-top: 20vh; }
                a { color: #4ade80; }
              </style>
            </head>
            <body>
              <p>We have moved! Redirecting you to our <a href="https://shubham-portfolio-seven-theta.vercel.app/">new portfolio</a>...</p>
            </body>
          </html>
          EOF
          cp build/index.html build/404.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4